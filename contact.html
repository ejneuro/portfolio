<main class="contact-page">
  
   
  
     <section class="contact-wrap" aria-label="Contact form section">
    <div class="scroll-track">
       <div class="scroll-thumb"></div>
    </div>
    
    <form class="contact-form" id="contactForm" action="#" method="post" data-netlify="true">
      <header class="contact-header">
        <h2>Let’s Connect</h2>
        <p>Have a project? Send message!</p>
      </header>

      <div class="field">
        <label for="name">Name</label>
        <div class="input-wrap">
          <i class="fa-solid fa-user"></i>
          <input type="text" id="name" name="name" placeholder="Your full name" required>
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <i class="fa-solid fa-envelope"></i>
          <input type="email" id="email" name="email" placeholder="your@email.com" required>
        </div>
      </div>

      <div class="field">
        <label for="message">Message</label>
        <div class="input-wrap">
          <i class="fa-solid fa-pen-to-square" style="top: 18px; align-self: flex-start;"></i>
          <textarea id="message" name="message" placeholder="Write your message here..." required></textarea>
        </div>
      </div>

      <div class="submit-row">
        <button type="submit" class="send-btn" id="sendBtn" aria-live="polite">
          <span class="btn-label">
            <i class="fa-solid fa-paper-plane"></i>
            <span>Send Message</span>
          </span>
          <span class="btn-loading">
            <span class="loader" aria-hidden="true"></span>
            <span>please wait</span>
          </span>
        </button>
      </div>
    </form>
  </section>
  
</main>
</body>
